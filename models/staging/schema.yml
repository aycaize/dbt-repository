version: 2

models:
  - name: stg_prices
    description: "EPIAS'tan çekilen saatlik PTF/SMF fiyat verisi"
    columns:
      - name: price_datetime
        description: "Fiyatın geçerli olduğu saat"
        tests:
          - not_null
          - unique
      - name: ptf_price_tl
        description: "Piyasa Takas Fiyatı (TL)"
        tests:
          - not_null
      - name: ptf_price_usd
        description: "Piyasa Takas Fiyatı (USD)"
        tests:
          - not_null
      - name: ptf_price_eur
        description: "Piyasa Takas Fiyatı (EUR)"
        tests:
          - not_null
      - name: hour
        description: "Saat (00:00 - 23:00)"
        tests:
          - not_null

  - name: stg_generation
    description: "EPIAS'tan çekilen saatlik kaynak bazlı üretim verisi"
    columns:
      - name: generation_datetime
        description: "Üretimin gerçekleştiği saat"
        tests:
          - not_null
          - unique
      - name: total_mwh
        description: "Toplam üretim (MWh)"
        tests:
          - not_null

  - name: stg_consumption
    description: "EPIAS'tan çekilen saatlik tüketim verisi"
    columns:
      - name: consumption_datetime
        description: "Tüketimin gerçekleştiği saat"
        tests:
          - not_null
          - unique
      - name: consumption_mwh
        description: "Toplam tüketim (MWh)"
        tests:
          - not_null