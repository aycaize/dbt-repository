version: 2

models:
  - name: dim_date
    description: "Tarih boyutu — 2022-2025 arası günlük kayıtlar"
    columns:
      - name: date_id
        description: "Tarih (primary key)"
        tests:
          - not_null
          - unique

  - name: dim_generation_source
    description: "Üretim kaynağı boyutu"
    columns:
      - name: source_id
        description: "Kaynak ID (primary key)"
        tests:
          - not_null
          - unique
      - name: is_renewable
        description: "Yenilenebilir enerji kaynağı mı?"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

  - name: dim_price_type
    description: "Fiyat tipi boyutu"
    columns:
      - name: price_type_id
        description: "Fiyat tipi ID (primary key)"
        tests:
          - not_null
          - unique
      - name: price_type_code
        description: "Fiyat tipi kodu"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['PTF', 'SMF', 'PTF-SMF']

  - name: dim_region
    description: "Bölge boyutu"
    columns:
      - name: region_id
        description: "Bölge ID (primary key)"
        tests:
          - not_null
          - unique

  - name: fact_hourly_prices
    description: "Saatlik PTF/SMF fiyat fact tablosu"
    columns:
      - name: date_id
        description: "Tarih (dim_date foreign key)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_id
      - name: ptf_price_tl
        description: "PTF fiyatı TL"
        tests:
          - not_null

  - name: fact_hourly_generation
    description: "Saatlik kaynak bazlı üretim fact tablosu"
    columns:
      - name: date_id
        description: "Tarih (dim_date foreign key)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_id
      - name: total_mwh
        description: "Toplam üretim MWh"
        tests:
          - not_null

  - name: fact_hourly_consumption
    description: "Saatlik tüketim fact tablosu"
    columns:
      - name: date_id
        description: "Tarih (dim_date foreign key)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_id
      - name: consumption_mwh
        description: "Toplam tüketim MWh"
        tests:
          - not_null

  - name: mart_renewable_share
    description: "Günlük yenilenebilir enerji payı"
    columns:
      - name: date_id
        description: "Tarih"
        tests:
          - not_null
      - name: renewable_share_pct
        description: "Yenilenebilir enerji yüzdesi"
        tests:
          - not_null

  - name: mart_price_volatility
    description: "Günlük fiyat volatilitesi metrikleri"
    columns:
      - name: date_id
        description: "Tarih"
        tests:
          - not_null
      - name: avg_price_tl
        description: "Günlük ortalama PTF fiyatı TL"
        tests:
          - not_null
  
  - name: mart_cpi
    description: "Aylık TÜFE endeksi, aylık ve yıllık enflasyon oranları"
    columns:
      - name: year
        description: "Yıl"
        tests:
          - not_null
      - name: month_number
        description: "Ay"
        tests:
          - not_null
      - name: cpi_index
        description: "TÜFE endeksi"
        tests:
          - not_null
      - name: monthly_inflation_pct
        description: "Bir önceki aya göre enflasyon yüzdesi"
      - name: annual_inflation_pct
        description: "Bir önceki yılın aynı ayına göre enflasyon yüzdesi"
      - name: cpi_deflator
        description: "2023 Ocak baz alınarak hesaplanan deflator"
        tests:
          - not_null